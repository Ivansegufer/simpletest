name: La mera verdura

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  greeting:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: "Where am I?"
        run: pwd
      - name: "Who am I?"
        run: whoami
      - name: "Create lock file"
        run: touch lockfile
      - name: "List all the files"
        run: ls -la
  
  check:
    runs-on: ubuntu-latest

    steps:
      - name: "List all the files before checkout"
        run: ls -la
      - uses: actions/checkout@v4

      - name: "List all the files after checkout"
        run: ls -la

